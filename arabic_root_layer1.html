  #quizSection { max-width: 420px; margin: 0 auto; }
  .quiz-word { font-size: 2.8em; font-weight: bold; direction: rtl; margin: 10px 0 6px; color: #3a1a00; }
  .option-btn { display: block; width: 100%; max-width: 340px; margin: 7px auto; font-size: 1em; padding: 10px 14px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; text-align: center; }
  .option-btn:hover:not(:disabled) { background: #ffe8c0; }
  .option-btn:disabled { cursor: default; }
  .feedback { font-size: 1.05em; margin: 10px 8px; padding: 10px 14px; border-radius: 8px; min-height: 30px; }
  .feedback.correct { background: #d4edda; color: #155724; }
  .feedback.wrong   { background: #f8d7da; color: #721c24; }
  .back-btn, .replay-btn, .next-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 1em; cursor: pointer; }
  .back-btn:hover, .replay-btn:hover, .next-btn:hover { background: #ffe8c0; }
  .back-btn { margin-top: 14px; }
  .next-btn { margin-top: 12px; }
  .score-bar { font-size: 0.9em; color: #888; margin-bottom: 6px; }

let currentRoot = null;
let score = { correct: 0, total: 0 };

function speakArabic(word) {
  const url = "https://translate.google.com/translate_tts?ie=UTF-8&q=" + encodeURIComponent(word) + "&tl=ar&client=tw-ob";
  new Audio(url).play().catch(function(){});
}

function buildRootGrid() {
  const grid = document.getElementById("rootGrid");
  rootsData.forEach(function(root) {
    const btn = document.createElement("button");
    btn.className = "root-btn";
    btn.dataset.search = root.root + " " + root.topic;
    btn.innerHTML = root.root + "<small>" + root.topic + "</small>";
    btn.onclick = function() { openRoot(root); };
    grid.appendChild(btn);
  });
}

function filterRoots(q) {
  q = q.toLowerCase();
  document.querySelectorAll(".root-btn").forEach(function(btn) {
    btn.style.display = btn.dataset.search.toLowerCase().includes(q) ? "" : "none";
  });
}

function openRoot(root) {
  currentRoot = root;
  score = { correct: 0, total: 0 };
  document.getElementById("rootScreen").style.display = "none";
  document.getElementById("derivativeScreen").style.display = "block";
  document.getElementById("selectedRoot").textContent = "Root: " + root.root + "  (" + root.topic + ")";

  const list = document.getElementById("derivativesList");
  list.innerHTML = "<h3>Conjugated Forms &amp; English Meanings</h3>";

  root.derivatives.forEach(function(d) {
    const row = document.createElement("div");
    row.className = "deriv-row";
    const arabicSpan = document.createElement("span");
    arabicSpan.className = "arabic-word";
    arabicSpan.textContent = d.word;
    const arrow = document.createElement("span");
    arrow.style.color = "#bbb";
    arrow.textContent = "→";
    const engSpan = document.createElement("span");
    engSpan.className = "english-meaning";
    engSpan.textContent = d.meaning;
    const speakBtn = document.createElement("button");
    speakBtn.className = "speak-sm";
    speakBtn.textContent = "🔊";
    speakBtn.onclick = (function(w){ return function(){ speakArabic(w); }; })(d.word);
    row.appendChild(arabicSpan);
    row.appendChild(arrow);
    row.appendChild(engSpan);
    row.appendChild(speakBtn);
    list.appendChild(row);
  });

  startQuiz();
}

function goBack() {
  document.getElementById("derivativeScreen").style.display = "none";
  document.getElementById("rootScreen").style.display = "block";
}

function startQuiz() {
  const quiz = document.getElementById("quizSection");
  quiz.innerHTML = "";

  const correct = currentRoot.derivatives[Math.floor(Math.random() * currentRoot.derivatives.length)];

  const hr = document.createElement("hr");
  const scoreBar = document.createElement("div");
  scoreBar.className = "score-bar";
  scoreBar.textContent = "Score: " + score.correct + " / " + score.total;
  const heading = document.createElement("h3");
  heading.textContent = "🧠 What does this word mean?";
  const wordDiv = document.createElement("div");
  wordDiv.className = "quiz-word";
  wordDiv.textContent = correct.word;
  const replayBtn = document.createElement("button");
  replayBtn.className = "replay-btn";
  replayBtn.textContent = "🔊 Replay";
  replayBtn.onclick = (function(w){ return function(){ speakArabic(w); }; })(correct.word);

  quiz.appendChild(hr);
  quiz.appendChild(scoreBar);
  quiz.appendChild(heading);
  quiz.appendChild(wordDiv);
  quiz.appendChild(replayBtn);
  quiz.appendChild(document.createElement("br"));
  quiz.appendChild(document.createElement("br"));

  const feedback = document.createElement("div");
  feedback.className = "feedback";
  quiz.appendChild(feedback);

  const optionWrap = document.createElement("div");
  const shuffled = currentRoot.derivatives.slice().sort(function(){ return Math.random() - 0.5; });

  shuffled.forEach(function(opt) {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.meaning;
    btn.onclick = function() {
      optionWrap.querySelectorAll("button").forEach(function(b){ b.disabled = true; });
      score.total++;
      if (opt.meaning === correct.meaning) {
        score.correct++;
        btn.style.background = "#90ee90";
        feedback.className = "feedback correct";
        feedback.textContent = "";
        feedback.innerHTML = "✅ Correct!  " + correct.word + " = " + correct.meaning;
      } else {
        btn.style.background = "#ffb3b3";
        feedback.className = "feedback wrong";
        feedback.innerHTML = "❌ Not quite — " + correct.word + " means: " + correct.meaning;
        optionWrap.querySelectorAll("button").forEach(function(b){
          if (b.textContent === correct.meaning) b.style.background = "#90ee90";
        });
      }
      const nextBtn = document.createElement("button");
      nextBtn.className = "next-btn";
      nextBtn.textContent = "Next Question ➡";
      nextBtn.onclick = startQuiz;
      quiz.appendChild(nextBtn);
    };
    optionWrap.appendChild(btn);
  });

  quiz.appendChild(optionWrap);
  setTimeout(function(){ speakArabic(correct.word); }, 350);
}

buildRootGrid();
