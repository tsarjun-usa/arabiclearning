<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Vocabulary Game | لُعْبَةُ المُفْرَدَات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0E0D0B;
    --surface:    #19180F;
    --card:       #201F14;
    --border:     #2E2C1A;
    --gold:       #C8973A;
    --gold-light: #E8B84B;
    --teal:       #2A7B6A;
    --teal-light: #3AA98E;
    --sand:       #E2CDA0;
    --sand-dim:   #9E8B72;
    --text:       #EDE0C4;
    --text-dim:   #7A6E58;
    --green:      #3A8A5A;
    --red:        #C04A3A;
    --font-ar:    'Noto Naskh Arabic', 'Traditional Arabic', serif;
    --font-ui:    'IBM Plex Mono', monospace;
    --r:          10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 60px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(200,151,58,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%,  rgba(42,123,106,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo-ar {
    font-family: var(--font-ar);
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    direction: rtl;
    line-height: 1.1;
  }

  .logo-en {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .score-box {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .score-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 8px 14px;
    text-align: center;
  }

  .score-chip .num { font-size: 20px; font-weight: 700; color: var(--gold); line-height: 1; }
  .score-chip .lbl { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 3px; transition: width 0.4s ease; }
  .progress-frac { font-size: 11px; color: var(--gold); font-weight: 700; white-space: nowrap; }

  /* ── IMAGE CARD ── */
  .image-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
  }

  .image-wrap {
    width: 100%;
    height: 280px;
    position: relative;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s;
  }

  .image-wrap img.loading { opacity: 0; }

  .img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 40px;
    color: var(--text-dim);
    opacity: 0.4;
  }

  .img-placeholder span { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }

  /* Word overlay on image */
  .word-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(14,13,11,0.92));
    padding: 48px 24px 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .word-arabic {
    font-family: var(--font-ar);
    font-size: 56px;
    font-weight: 700;
    color: var(--sand);
    direction: rtl;
    line-height: 1.2;
    cursor: pointer;
    transition: color 0.15s;
  }

  .word-arabic:hover { color: var(--gold-light); }

  .hear-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: var(--r);
    padding: 10px 18px;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .hear-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .hear-btn:active { transform: translateY(0); }

  /* ── INSTRUCTION ── */
  .instruction {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 14px;
  }

  /* ── CHOICES ── */
  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 12px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--sand);
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.3;
    pointer-events: auto;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(200,151,58,0.12);
  }

  .choice-btn.correct {
    background: rgba(58,138,90,0.2);
    border-color: var(--green);
    color: #6ACA8A;
  }

  .choice-btn.wrong {
    background: rgba(192,74,58,0.2);
    border-color: var(--red);
    color: #E07060;
  }

  .choice-btn:disabled { cursor: default; transform: none !important; }

  /* ── FEEDBACK BANNER ── */
  .feedback-banner {
    border-radius: var(--r);
    padding: 12px 16px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: 700;
  }

  .feedback-banner.show { display: flex; }
  .feedback-banner.correct-fb { background: rgba(58,138,90,0.15); border: 1px solid var(--green); color: #6ACA8A; }
  .feedback-banner.wrong-fb   { background: rgba(192,74,58,0.15);  border: 1px solid var(--red);   color: #E07060; }

  /* ── ROUND COMPLETE OVERLAY ── */
  .round-overlay {
    display: none;
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 20px;
  }

  .round-overlay.show { display: block; }

  .round-emoji { font-size: 48px; margin-bottom: 12px; }
  .round-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; font-weight: 700; }
  .round-msg   { font-size: 11px; color: var(--text-dim); line-height: 1.8; margin-bottom: 24px; }

  .btn-next-round {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: var(--r);
    padding: 14px 32px;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-next-round:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* ── REVIEW BADGE ── */
  .review-badge {
    display: inline-block;
    background: rgba(192,74,58,0.15);
    border: 1px solid var(--red);
    color: #E07060;
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: var(--r);
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--gold);
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .word-arabic { font-size: 40px; }
    .choices-grid { grid-template-columns: 1fr; }
    .image-wrap { height: 220px; }
  }
</style>
</head>

</div><!-- /wrap -->

// ═══════════════════════════════════════════════
//  TTS — Web Speech API (no blocked URLs)
// ═══════════════════════════════════════════════
function playWord() {
  if (!window.speechSynthesis) { toast('TTS not available'); return; }
  if (!current) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(current.ar);
  u.lang  = 'ar-SA';
  u.rate  = 0.75;
  u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang.startsWith('ar'));
  if (arVoice) u.voice = arVoice;
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
//  IMAGE — loremflickr (free, keyword-based, no API key)
// ═══════════════════════════════════════════════
function loadImage(englishWord) {
  const img = document.getElementById('wordImage');
  const placeholder = document.getElementById('imgPlaceholder');
  img.classList.add('loading');
  placeholder.style.display = 'flex';

  const kw  = imgKeyword[englishWord] || englishWord;
  const seed = Math.floor(Math.random() * 9000) + 1000;
  // loremflickr gives real keyword-matched photos, free, no CORS issues
  img.src = `https://loremflickr.com/720/360/${encodeURIComponent(kw)}?lock=${seed}`;
}

function onImgLoad() {
  const img = document.getElementById('wordImage');
  const placeholder = document.getElementById('imgPlaceholder');
  img.classList.remove('loading');
  placeholder.style.display = 'none';
}

function onImgError() {
  const img = document.getElementById('wordImage');
  const placeholder = document.getElementById('imgPlaceholder');
  img.classList.add('loading');
  placeholder.innerHTML = '🔍<span>No image found</span>';
  placeholder.style.display = 'flex';
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function startRound() {
  document.getElementById('roundOverlay').classList.remove('show');
  roundWords    = shuffle([...words]).slice(0, 20);
  wrongWords    = [];
  index         = 0;
  score         = 0;
  currentStreak = 0;
  isReviewing   = false;
  document.getElementById('scoreNum').textContent  = 0;
  document.getElementById('streakNum').textContent = 0;
  document.getElementById('reviewBadge').style.display = 'none';
  nextQuestion();
}

function nextQuestion() {
  if (index >= roundWords.length) {
    if (wrongWords.length > 0) {
      // Review missed words once
      roundWords  = shuffle([...wrongWords]);
      wrongWords  = [];
      index       = 0;
      isReviewing = true;
      document.getElementById('reviewBadge').style.display = 'inline-block';
      nextQuestion();
      return;
    }
    showRoundComplete();
    return;
  }

  locked  = false;
  current = roundWords[index];

  updateProgress();
  loadImage(current.en);
  document.getElementById('wordDisplay').textContent = current.ar;
  document.getElementById('feedbackBanner').className = 'feedback-banner';
  generateChoices();

  // Auto-play after short delay
  setTimeout(playWord, 600);
}

function generateChoices() {
  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';

  // Pick 3 wrong options
  let pool = words.filter(w => w.ar !== current.ar);
  let options = shuffle(pool).slice(0, 3);
  options.push(current);
  options = shuffle(options);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = opt.en;
    btn.onclick     = () => handleChoice(opt, btn);
    grid.appendChild(btn);
  });
}

function handleChoice(opt, btn) {
  if (locked) return;
  locked = true;

  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedbackBanner');

  if (opt.ar === current.ar) {
    btn.classList.add('correct');
    score++;
    currentStreak++;
    document.getElementById('scoreNum').textContent  = score;
    document.getElementById('streakNum').textContent = currentStreak;
    fb.className   = 'feedback-banner correct-fb show';
    fb.innerHTML   = `✓ Correct! &nbsp;<strong>${current.ar}</strong> = ${current.en}`;
  } else {
    btn.classList.add('wrong');
    currentStreak = 0;
    document.getElementById('streakNum').textContent = 0;
    // Highlight the correct answer
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === current.en) b.classList.add('correct');
    });
    wrongWords.push(current);
    fb.className   = 'feedback-banner wrong-fb show';
    fb.innerHTML   = `✗ That was &nbsp;<strong>${current.ar}</strong> = ${current.en}`;
    // Replay the word so they hear it on wrong answer
    setTimeout(playWord, 200);
  }

  index++;
  setTimeout(nextQuestion, 1100);
}

function updateProgress() {
  const total = roundWords.length;
  const pct   = Math.round((index / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFrac').textContent = `${index} / ${total}`;
}

function showRoundComplete() {
  const overlay  = document.getElementById('roundOverlay');
  const pct      = Math.round((score / 20) * 100);
  const emoji    = pct >= 90 ? '🏆' : pct >= 70 ? '⭐' : pct >= 50 ? '💪' : '📚';
  const msg      = pct >= 90
    ? 'Outstanding! Near-perfect score.'
    : pct >= 70
    ? 'Great work — keep building your vocab!'
    : pct >= 50
    ? 'Good effort. Review and try again!'
    : 'Keep practising — every round builds your skills.';

  document.getElementById('roundEmoji').textContent  = emoji;
  document.getElementById('roundMsg').innerHTML =
    `You scored <strong style="color:var(--gold)">${score} / 20</strong> (${pct}%)<br>${msg}`;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressFrac').textContent = `20 / 20`;
  overlay.classList.add('show');
  document.getElementById('reviewBadge').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

startRound();
</script>
